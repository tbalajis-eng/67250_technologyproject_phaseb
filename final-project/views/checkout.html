<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Your name">
  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="MonoMuse website redesign project">
  <title>MonoMuse – Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:ital,wght@0,100;0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
  <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
  <div class="container">

    <header class="header">
      <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
    </header>

    <nav class="nav_bar">
      <button id="hamburger" onclick="toggleNav()" aria-label="Toggle navigation">&#9776;</button>
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="exhibitions.html">Exhibitions</a>
      <a href="tickets.html">Tickets</a>
      <a href="buytickets.html">Buy Tickets</a>
      <a href="checkout.html">Checkout</a>
      <a href="membership.html">Membership</a>
    </nav>

    <main class="main">
      <h1>Checkout</h1>
      <p>Complete the form below to purchase your tickets. Required fields are marked with *.</p>

      <!-- Error summary box -->
      <div id="errorBox" class="error-box" style="display:none;"></div>

      <form id="checkoutForm" novalidate>

        <label for="visitorName">Full Name *</label>
        <input type="text" id="visitorName" name="visitorName" placeholder="Full name">
        <span class="field-error" id="err-name"></span>

        <label for="visitDate">Visit Date *</label>
        <input type="date" id="visitDate" name="visitDate">
        <span class="field-error" id="err-date"></span>

        <label for="ticketType">Ticket Type *</label>
        <select id="ticketType" name="ticketType" onchange="calcPrice()">
          <option value="">-- Select --</option>
          <option value="18">Adult — $18</option>
          <option value="10">Student — $10</option>
          <option value="15">Member — $15</option>
        </select>
        <span class="field-error" id="err-type"></span>

        <label for="ticketQty">Number of Tickets (1–10) *</label>
        <input type="number" id="ticketQty" name="ticketQty" min="1" max="10" placeholder="1" oninput="calcPrice()">
        <span class="field-error" id="err-qty"></span>

        <!-- Auto price display -->
        <div class="price-display" id="priceDisplay" style="display:none;">
          Total: <span id="totalPrice">$0</span>
        </div>

        <label for="visitorEmail">Email Address *</label>
        <input type="email" id="visitorEmail" name="visitorEmail" placeholder="you@example.com">
        <span class="field-error" id="err-email"></span>

        <label for="zipCode">Zip Code (optional — 5 digits if provided)</label>
        <input type="text" id="zipCode" name="zipCode" placeholder="15213" maxlength="5">
        <span class="field-error" id="err-zip"></span>

        <div class="checkbox-row">
          <input type="checkbox" id="mailingList" name="mailingList">
          <label for="mailingList" class="checkbox-label">Join our mailing list for exhibition updates and member offers</label>
        </div>

        <button type="button" class="submit-btn" onclick="submitOrder()">Place Order</button>
      </form>
    </main>

    <footer class="footer">
      <p id="copyYear"></p>
    </footer>

  </div>
</body>
</html>
